server {
    listen 80;
    server_name localhost;
    root /var/www/html/web;
    index index.php;

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    # Bedrock: /wp-admin -> /wp/wp-admin (preserves host+port)
    location ~ ^/wp-admin(/.*)?$ {
        return 301 $scheme://$http_host/wp/wp-admin$1;
    }

    # Bedrock: /wp-login.php -> /wp/wp-login.php (preserves host+port)
    location = /wp-login.php {
        return 301 $scheme://$http_host/wp/wp-login.php;
    }

    # Fonts: long-lived + immutable (browser never revalidates)
    location ~* \.(woff2|woff|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        log_not_found off;
    }

    # Other static files — no aggressive cache in dev
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|map)$ {
        try_files $uri =404;
        expires off;
        add_header Cache-Control "no-cache";
        log_not_found off;
    }

    # WordPress core in /wp subdirectory
    location /wp/ {
        try_files $uri $uri/ /wp/index.php?$query_string;
    }

    # Bedrock entry point
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
    }
}
