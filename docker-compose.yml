version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lomar-gcg-app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/var/www/html # código fuente local → contenedor
      - composer-cache:/root/.composer/cache # cache de Composer persistente
    networks:
      - lomar_network

  web:
    image: nginx:alpine
    container_name: lomar-gcg-web
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - .:/var/www/html # mismo source que app
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf # config nginx
    networks:
      - lomar_network
    depends_on:
      - app

volumes:
  composer-cache:

networks:
  lomar_network:
    driver: bridge
